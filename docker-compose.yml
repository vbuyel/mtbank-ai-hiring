services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      OPENAI_API_BASE_URLS: http://pipelines:9099
      OPENAI_API_KEYS: ${PIPELINES_API_KEY:-mtbank-pipelines-key}
      ENABLE_FOLLOW_UP_GENERATION: "False"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      pipelines:
        condition: service_healthy
    restart: unless-stopped

  pipelines:
    build:
      context: .
      dockerfile: Dockerfile.pipelines
    environment:
      PIPELINES_API_KEY: ${PIPELINES_API_KEY:-mtbank-pipelines-key}
      DIARIZER_LLM_BASE_URL: ${DIARIZER_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      DIARIZER_LLM_API_KEY: ${DIARIZER_LLM_API_KEY:-ollama}
      DIARIZER_LLM_MODEL: ${DIARIZER_LLM_MODEL:-llama3.2}
      CLASSIFIER_LLM_BASE_URL: ${CLASSIFIER_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      CLASSIFIER_LLM_API_KEY: ${CLASSIFIER_LLM_API_KEY:-ollama}
      CLASSIFIER_LLM_MODEL: ${CLASSIFIER_LLM_MODEL:-llama3.2}
      QUALITY_LLM_BASE_URL: ${QUALITY_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      QUALITY_LLM_API_KEY: ${QUALITY_LLM_API_KEY:-ollama}
      QUALITY_LLM_MODEL: ${QUALITY_LLM_MODEL:-llama3.2}
      COMPLIANCE_LLM_BASE_URL: ${COMPLIANCE_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      COMPLIANCE_LLM_API_KEY: ${COMPLIANCE_LLM_API_KEY:-ollama}
      COMPLIANCE_LLM_MODEL: ${COMPLIANCE_LLM_MODEL:-llama3.2}
      SUMMARIZER_LLM_BASE_URL: ${SUMMARIZER_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      SUMMARIZER_LLM_API_KEY: ${SUMMARIZER_LLM_API_KEY:-ollama}
      SUMMARIZER_LLM_MODEL: ${SUMMARIZER_LLM_MODEL:-llama3.2}
      WHISPER_MODEL: ${WHISPER_MODEL:-tiny}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      HF_HOME: /root/.cache/huggingface
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - open-webui-data:/open-webui-data:ro
    ports:
      - "9099:9099"
    healthcheck:
      test:
        ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9099/')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DIARIZER_LLM_BASE_URL: ${DIARIZER_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      DIARIZER_LLM_API_KEY: ${DIARIZER_LLM_API_KEY:-ollama}
      DIARIZER_LLM_MODEL: ${DIARIZER_LLM_MODEL:-llama3.2}
      CLASSIFIER_LLM_BASE_URL: ${CLASSIFIER_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      CLASSIFIER_LLM_API_KEY: ${CLASSIFIER_LLM_API_KEY:-ollama}
      CLASSIFIER_LLM_MODEL: ${CLASSIFIER_LLM_MODEL:-llama3.2}
      QUALITY_LLM_BASE_URL: ${QUALITY_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      QUALITY_LLM_API_KEY: ${QUALITY_LLM_API_KEY:-ollama}
      QUALITY_LLM_MODEL: ${QUALITY_LLM_MODEL:-llama3.2}
      COMPLIANCE_LLM_BASE_URL: ${COMPLIANCE_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      COMPLIANCE_LLM_API_KEY: ${COMPLIANCE_LLM_API_KEY:-ollama}
      COMPLIANCE_LLM_MODEL: ${COMPLIANCE_LLM_MODEL:-llama3.2}
      SUMMARIZER_LLM_BASE_URL: ${SUMMARIZER_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      SUMMARIZER_LLM_API_KEY: ${SUMMARIZER_LLM_API_KEY:-ollama}
      SUMMARIZER_LLM_MODEL: ${SUMMARIZER_LLM_MODEL:-llama3.2}
      WHISPER_MODEL: ${WHISPER_MODEL:-tiny}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      HF_HOME: /root/.cache/huggingface
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "8000:8000"
    healthcheck:
      test:
        ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

volumes:
  open-webui-data:
